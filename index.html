<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Analisador Lotofácil PRO</title><style>
body{background:#0A0A0A;color:#fff;font-family:Arial;margin:0;padding:0}
.btnMenu{position:fixed;top:10px;left:10px;z-index:1000;font-size:28px;background:#9200D6;border:none;color:#fff;padding:8px 14px;border-radius:8px;cursor:pointer}
.menu{position:fixed;left:-220px;top:0;width:200px;height:100%;background:#111;padding:15px;border-right:2px solid #9200D6;transition:.3s;z-index:999;overflow-y:auto}
.menu.ativo{left:0}.menu h3{color:#9200D6;text-align:center}
.pasta{padding:12px;margin:6px 0;background:#222;border-radius:8px;cursor:pointer;text-align:center;font-weight:bold;display:flex;justify-content:space-between}
.pasta:hover{background:#9200D6}.pasta span{font-size:12px;color:#aaa}.pastaMae{background:#9200D6;border:2px solid #00BFFF}
.conteudo{padding:60px 15px 15px;text-align:center}h1{color:#9200D6}
input{width:100px;padding:10px;border-radius:8px;border:2px solid #9200D6;background:#222;color:#fff;text-align:center;margin:3px}
.inputBusca{width:300px}button{padding:10px 15px;background:#9200D6;border:none;border-radius:10px;cursor:pointer;font-weight:bold;margin:5px;color:#fff}
.btnNav{background:#00BFFF}.btnApagar{background:red;padding:5px 10px;font-size:12px;margin-top:5px}
.btnVoltarPasta{background:#555}.btnInteligente{background:#00BFFF}
.btnFormula{background:#00FF7F;color:#000}.btnFormulaZUD{background:#FF00FF;color:#000}.btnFormulaPI{background:#FFA500;color:#000} /* NOVO */
.tabela{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;max-width:300px;margin:20px auto}
.numero{width:100%;aspect-ratio:1/1;border:1px solid #444;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:bold;background:#222}
.sorteado{background:#9200D6!important}
.jogoSalvo{background:#222;padding:12px;margin:10px auto;border-radius:10px;max-width:400px;text-align:left;border:1px solid #9200D6;cursor:pointer;transition:.2s}
.jogoSalvo:hover{background:#333;border-color:#9200D6}
.alerta{background:#ff9800;color:#000;padding:10px;border-radius:10px;margin:10px auto;max-width:400px;text-align:left;font-weight:bold;font-size:14px}
.boxBusca{background:#222;padding:15px;border-radius:10px;margin:15px auto;max-width:400px;border:2px solid #00BFFF}
.freqTabela{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;max-width:400px;margin:15px auto}
.freqItem{background:#222;border:1px solid #9200D6;border-radius:8px;padding:8px 5px}
.freqNum{font-size:18px;font-weight:bold;color:#9200D6}.freqQtd{font-size:14px}
.resultadoInteligente{background:#111;border:2px solid #00BFFF;padding:10px;margin:8px 0;border-radius:8px;text-align:left}
.resultadoInteligente b{color:#00BFFF}.resultadoFormula{background:#111;border:2px solid #00FF7F;padding:10px;margin:8px 0;border-radius:8px;text-align:left}
.resultadoFormula b{color:#00FF7F}.resultadoFormulaZUD{background:#111;border:2px solid #FF00FF;padding:10px;margin:8px 0;border-radius:8px;text-align:left}
.resultadoFormulaZUD b{color:#FF00FF}.resultadoFormulaPI{background:#111;border:2px solid #FFA500;padding:10px;margin:8px 0;border-radius:8px;text-align:left} /* NOVO */
.resultadoFormulaPI b{color:#FFA500} /* NOVO */
.formulaZUD{color:#00BFFF;font-weight:bold;font-size:15px}
.formula5x5{color:#00FF7F;font-weight:bold;font-size:15px}.formulaPI{color:#FFA500;font-weight:bold;font-size:15px} /* NOVO */
.oculto{display:none}
</style></head><body>
<button class="btnMenu" onclick="toggleMenu()">☰</button>
<div class="menu" id="menuLateral"><h3>📁 PASTAS</h3><div id="listaPastas"></div></div>
<div class="conteudo" id="telaPesquisa"><h1>🎯 Analisador Lotofácil PRO</h1>
De: <input type="number" id="de" placeholder="3131"> Até: <input type="number" id="ate" placeholder="3131"><br>
<button onclick="buscarIntervalo()">🔍 PESQUISAR</button><button onclick="ultimo()">ULTIMO</button>
<button onclick="copiarNumeros()">📋 COPIAR</button><button onclick="salvarJogo()">💾 SALVAR</button><br>
<button class="btnNav" onclick="anterior()">⬅ ANTERIOR</button><button class="btnNav" onclick="proximo()">PRÓXIMO ➡</button>
<div id="info"></div><div class="tabela" id="tabela"></div></div>
<div class="conteudo oculto" id="telaPasta"><button class="btnVoltarPasta" onclick="voltarMenuPrincipal()">⬅ VOLTAR PASTAS</button>
<div class="boxBusca"><h3>🔍 BUSCAR COMBINAÇÃO</h3><input type="text" id="buscaCombo" class="inputBusca" placeholder="Ex: 03,10,11,15,19,22"><br>
<button onclick="buscarCombinacao()">BUSCAR NA PASTA</button><button class="btnInteligente" onclick="buscarInteligente()">🧠 BUSCA INTELIGENTE</button></div>
<div class="boxBusca"><h3>🎯 BUSCAR FÓRMULA 5x5</h3><input type="text" id="buscaFormula5x5" class="inputBusca" placeholder="Ex: 2.3.4.2.4"><br>
<button class="btnFormula" onclick="buscarFormula5x5()">BUSCAR 5x5 NA PASTA</button><button class="btnFormula" onclick="buscarInteligente5x5()">🧠 BUSCA INTELIGENTE 5x5</button></div>
<div class="boxBusca"><h3>🟣 BUSCAR FÓRMULA ZUD</h3><input type="text" id="buscaFormulaZUD" class="inputBusca" placeholder="Ex: Z 2-2 | U 3-4 | D 2-2"><br>
<button class="btnFormulaZUD" onclick="buscarFormulaZUD()">BUSCAR ZUD NA PASTA</button><button class="btnFormulaZUD" onclick="buscarInteligenteZUD()">🧠 BUSCA INTELIGENTE ZUD</button></div>
<div class="boxBusca"><h3>⚖️ BUSCAR FÓRMULA PI</h3><input type="text" id="buscaFormulaPI" class="inputBusca" placeholder="Ex: 6.9"><br> <!-- NOVO -->
<button class="btnFormulaPI" onclick="buscarFormulaPI()">BUSCAR PI NA PASTA</button><button class="btnFormulaPI" onclick="buscarInteligentePI()">🧠 BUSCA INTELIGENTE PI</button></div> <!-- NOVO -->
<div id="resultadoBusca"></div><h3>📊 FREQUÊNCIA DOS NÚMEROS</h3><div class="freqTabela" id="tabelaFrequencia"></div><div id="areaPastas"></div></div>
<script>
const API="https://loteriascaixa-api.herokuapp.com/api/lotofacil/";let jogoAtual={},banco=JSON.parse(localStorage.getItem('lotofacilBanco'))||{},pastaAberta="",faixaAberta="";const padroesLista=['4.7.4','5.5.5','5.6.4','6.5.4','6.7.2','7.6.2','6.6.3','5.7.3','7.5.3','7.6.2'];
function gerarFaixas(){let f=['TODOS'];for(let i=3101;i<=4001;i+=100)f.push(i);return f}
function criarTabela(){const t=document.getElementById('tabela');t.innerHTML="";for(let i=1;i<=25;i++){let n=i.toString().padStart(2,'0');t.innerHTML+=`<div class="numero" id="n${n}">${n}</div>`}montarMenuPrincipal()}
function montarMenuPrincipal(){let h="";gerarFaixas().forEach(f=>{let q=contarJogosNaFaixa(f);h+=`<div class="pasta pastaMae" onclick="abrirFaixa('${f}')">${f} <span>${q} jogos</span></div>`});document.getElementById('listaPastas').innerHTML=h}
function contarJogosNaFaixa(f){if(f=='TODOS')return Object.values(banco).flat().length;let i=parseInt(f),fim=i+99,t=0;Object.values(banco).forEach(p=>{t+=p.filter(j=>j.concurso>=i&&j.concurso<=fim).length});return t}
function toggleMenu(){document.getElementById('menuLateral').classList.toggle('ativo')}
function calcular5x5(d){return`${d.filter(n=>n>=1&&n<=5).length}.${d.filter(n=>n>=6&&n<=10).length}.${d.filter(n=>n>=11&&n<=15).length}.${d.filter(n=>n>=16&&n<=20).length}.${d.filter(n=>n>=21&&n<=25).length}`}
function calcularZUD(d){let z=d.filter(n=>n<=9),u=d.filter(n=>n>=10&&n<=19),d2=d.filter(n=>n>=20);return`Z ${z.filter(n=>n%2==0).length}-${z.length-z.filter(n=>n%2==0).length} | U ${u.filter(n=>n%2==0).length}-${u.length-u.filter(n=>n%2==0).length} | D ${d2.filter(n=>n%2==0).length}-${d2.length-d2.filter(n=>n%2==0).length}`}
function calcularPI(d){return`${d.filter(n=>n%2==0).length}.${d.filter(n=>n%2!=0).length}`} /* NOVO */
function analisarPadrao(d){let g0=d.filter(n=>n<=9).length,g1=d.filter(n=>n>=10&&n<=19).length,g2=d.filter(n=>n>=20).length,pares=d.filter(n=>n%2==0).length;return{padrao:`${g0}.${g1}.${g2}`,pares,impares:15-pares,dezenas:d,formulaZUD:calcularZUD(d),formula5x5:calcular5x5(d),formulaPI:calcularPI(d)}} /* NOVO */
async function buscarIntervalo(){let d=document.getElementById('de').value,a=document.getElementById('ate').value;if(!d||!a)return alert("Preencha DE e ATÉ");let r=await fetch(API+d),data=await r.json();mostrar(data)}
async function ultimo(){let r=await fetch(API+"latest"),data=await r.json();document.getElementById('de').value=data.concurso;document.getElementById('ate').value=data.concurso;mostrar(data)}
function mostrar(data){limparTabela();jogoAtual=analisarPadrao(data.dezenas.map(Number));jogoAtual.concurso=data.concurso;jogoAtual.data=data.data;document.getElementById('info').innerHTML=`<h2>Concurso ${data.concurso} - ${data.data}</h2><p><b>Padrão:</b> ${jogoAtual.padrao} | <b>Pares:</b> ${jogoAtual.pares} | <b>Ímpares:</b> ${jogoAtual.impares}</p><p class="formulaZUD"><b>Fórmula ZUD:</b> ${jogoAtual.formulaZUD}</p><p class="formula5x5"><b>Fórmula 5x5:</b> ${jogoAtual.formula5x5}</p><p class="formulaPI"><b>Par/Ímpar PI:</b> ${jogoAtual.formulaPI}</p>`;data.dezenas.forEach(n=>document.getElementById('n'+n).classList.add('sorteado'))} /* NOVO */
function carregarJogoNaTabela(j){voltarPesquisa();limparTabela();jogoAtual=j;if(!j.formulaZUD)j.formulaZUD=calcularZUD(j.dezenas);if(!j.formula5x5)j.formula5x5=calcular5x5(j.dezenas);if(!j.formulaPI)j.formulaPI=calcularPI(j.dezenas); /* NOVO */ document.getElementById('de').value=j.concurso;document.getElementById('ate').value=j.concurso;document.getElementById('info').innerHTML=`<h2>Concurso ${j.concurso} - ${j.data}</h2><p><b>Padrão:</b> ${j.padrao} | <b>Pares:</b> ${j.pares} | <b>Ímpares:</b> ${j.impares}</p><p class="formulaZUD"><b>Fórmula ZUD:</b> ${jogoAtual.formulaZUD}</p><p class="formula5x5"><b>Fórmula 5x5:</b> ${jogoAtual.formula5x5}</p><p class="formulaPI"><b>Par/Ímpar PI:</b> ${jogoAtual.formulaPI}</p>`;j.dezenas.forEach(n=>document.getElementById('n'+n).classList.add('sorteado'))} /* NOVO */
function limparTabela(){document.querySelectorAll('.numero').forEach(el=>el.classList.remove('sorteado'))}
function copiarNumeros(){if(!jogoAtual.dezenas)return alert("Pesquise primeiro");navigator.clipboard.writeText(jogoAtual.dezenas.join(", "));alert("Copiado!")}
function salvarJogo(){if(!jogoAtual.dezenas)return alert("Pesquise um concurso primeiro");let p=jogoAtual.padrao;if(!banco[p])banco[p]=[];if(!banco[p].find(j=>j.concurso==jogoAtual.concurso)){banco[p].push(jogoAtual);localStorage.setItem('lotofacilBanco',JSON.stringify(banco));montarMenuPrincipal();alert(`Jogo salvo na pasta ${p}!`)}else{alert("Esse concurso já está salvo")}}
function proximo(){let d=parseInt(document.getElementById('de').value);if(!d)return;document.getElementById('de').value=d+1;document.getElementById('ate').value=d+1;buscarIntervalo()}
function anterior(){let d=parseInt(document.getElementById('de').value);if(!d||d<=1)return;document.getElementById('de').value=d-1;document.getElementById('ate').value=d-1;buscarIntervalo()}
function apagarJogo(p,c,e){e.stopPropagation();if(confirm(`Apagar concurso ${c} da pasta ${p}?`)){banco[p]=banco[p].filter(j=>j.concurso!=c);localStorage.setItem('lotofacilBanco',JSON.stringify(banco));montarMenuPrincipal();abrirFaixa(faixaAberta)}}
function contarIguais(a1,a2){return a1.filter(n=>a2.includes(n)).length}
function verificarDuplicidade(j){let a=[];for(let i=0;i<j.length;i++)for(let k=i+1;k<j.length;k++){let ig=contarIguais(j[i].dezenas,j[k].dezenas);if(ig>=10)a.push(`⚠️ <b>2 Jogos:</b> ${j[i].concurso} vs ${j[k].concurso} = ${ig} iguais`)}for(let i=0;i<j.length;i++)for(let k=i+1;k<j.length;k++)for(let l=k+1;l<j.length;l++){let g=[j[i],j[k],j[l]],n=g[0].dezenas.filter(x=>g[1].dezenas.includes(x)&&g[2].dezenas.includes(x));if(n.length>=5)a.push(`🔥 <b>3 Jogos:</b> ${g.map(x=>x.concurso).join(', ')} = ${n.length} iguais: ${n.join(', ')}`)}return a.slice(0,10)}
function calcularFrequencia(j){let f={};for(let i=1;i<=25;i++)f[i.toString().padStart(2,'0')]=0;j.forEach(x=>{x.dezenas.forEach(n=>f[n]++)});let h="";for(let i=1;i<=25;i++){let n=i.toString().padStart(2,'0');h+=`<div class="freqItem"><div class="freqNum">${n}</div><div class="freqQtd">${f[n]}x</div></div>`}document.getElementById('tabelaFrequencia').innerHTML=h}
function buscarCombinacao(){let t=document.getElementById('buscaCombo').value;if(!t)return alert("Digite os números");let c=t.split(',').map(n=>n.trim().padStart(2,'0')),j=getJogosDoPadrao(pastaAberta),h=`<h4>Resultado da busca no padrão ${pastaAberta}:</h4>`;j.forEach(x=>{let a=contarIguais(c,x.dezenas);if(a>0)h+=`<p><b>Concurso ${x.concurso}:</b> ${a} acertos</p>`});if(h==`<h4>Resultado da busca no padrão ${pastaAberta}:</h4>`)h+=`<p>Nenhum jogo bateu</p>`;document.getElementById('resultadoBusca').innerHTML=h}
function buscarFormula5x5(){let t=document.getElementById('buscaFormula5x5').value;if(!t)return alert("Digite a fórmula 5x5. Ex: 2.3.4.2.4");let j=getJogosDoPadrao(pastaAberta),h=`<h4>🎯 Resultado Busca 5x5: ${t} no padrão ${pastaAberta}</h4>`,e=0;j.forEach(x=>{if(!x.formula5x5)x.formula5x5=calcular5x5(x.dezenas);if(x.formula5x5==t){e++;h+=`<div class="resultadoFormula"><b>Concurso ${x.concurso}</b> - ${x.data}<br><b>Números:</b> ${x.dezenas.join(", ")}<br><b>5x5:</b> ${x.formula5x5}</div>`}});if(e==0)h+=`<p>Nenhum jogo com a fórmula ${t} encontrado</p>`;else h+=`<p><b>Total encontrado:</b> ${e} jogos</p>`;document.getElementById('resultadoBusca').innerHTML=h}
function buscarInteligente5x5(){let j=getJogosDoPadrao(pastaAberta);if(j.length<3)return alert(`Precisa de no mínimo 3 jogos no padrão ${pastaAberta}`);let m={};j.forEach(x=>{if(!x.formula5x5)x.formula5x5=calcular5x5(x.dezenas);if(!m[x.formula5x5])m[x.formula5x5]=[];m[x.formula5x5].push({concurso:x.concurso,data:x.data,dezenas:x.dezenas})});let r=[];for(let f in m)if(m[f].length>=3)r.push({formula:f,qtd:m[f].length,jogos:m[f].sort((a,b)=>a.concurso-b.concurso)});r.sort((a,b)=>b.qtd-a.qtd);let h=`<h4>🧠 BUSCA INTELIGENTE 5x5 - Padrão ${pastaAberta}</h4><p>Fórmulas 5x5 que se repetiram 3+ vezes</p>`;if(r.length==0)h+=`<p>Nenhuma fórmula 5x5 se repetiu 3 vezes no ${pastaAberta}</p>`;else r.slice(0,20).forEach(x=>{h+=`<div class="resultadoFormula"><b>Fórmula 5x5:</b> ${x.formula}<br><b>Repetiu:</b> ${x.qtd} vezes<br><b>Concursos:</b> ${x.jogos.map(j=>j.concurso).join(', ')}</div>`});document.getElementById('resultadoBusca').innerHTML=h}
function buscarFormulaZUD(){let t=document.getElementById('buscaFormulaZUD').value;if(!t)return alert("Digite a fórmula ZUD. Ex: Z 2-2 | U 3-4 | D 2-2");let j=getJogosDoPadrao(pastaAberta),h=`<h4>🟣 Resultado Busca ZUD: ${t} no padrão ${pastaAberta}</h4>`,e=0;j.forEach(x=>{if(!x.formulaZUD)x.formulaZUD=calcularZUD(x.dezenas);if(x.formulaZUD==t){e++;h+=`<div class="resultadoFormulaZUD"><b>Concurso ${x.concurso}</b> - ${x.data}<br><b>Números:</b> ${x.dezenas.join(", ")}<br><b>ZUD:</b> ${x.formulaZUD}</div>`}});if(e==0)h+=`<p>Nenhum jogo com a fórmula ${t} encontrado</p>`;else h+=`<p><b>Total encontrado:</b> ${e} jogos</p>`;document.getElementById('resultadoBusca').innerHTML=h}
function buscarInteligenteZUD(){let j=getJogosDoPadrao(pastaAberta);if(j.length<3)return alert(`Precisa de no mínimo 3 jogos no padrão ${pastaAberta}`);let m={};j.forEach(x=>{if(!x.formulaZUD)x.formulaZUD=calcularZUD(x.dezenas);if(!m[x.formulaZUD])m[x.formulaZUD]=[];m[x.formulaZUD].push({concurso:x.concurso,data:x.data,dezenas:x.dezenas})});let r=[];for(let f in m)if(m[f].length>=3)r.push({formula:f,qtd:m[f].length,jogos:m[f].sort((a,b)=>a.concurso-b.concurso)});r.sort((a,b)=>b.qtd-a.qtd);let h=`<h4>🧠 BUSCA INTELIGENTE ZUD - Padrão ${pastaAberta}</h4><p>Fórmulas ZUD que se repetiram 3+ vezes</p>`;if(r.length==0)h+=`<p>Nenhuma fórmula ZUD se repetiu 3 vezes no ${pastaAberta}</p>`;else r.slice(0,20).forEach(x=>{h+=`<div class="resultadoFormulaZUD"><b>Fórmula ZUD:</b> ${x.formula}<br><b>Repetiu:</b> ${x.qtd} vezes<br><b>Concursos:</b> ${x.jogos.map(j=>j.concurso).join(', ')}</div>`});document.getElementById('resultadoBusca').innerHTML=h}
function buscarFormulaPI(){let t=document.getElementById('buscaFormulaPI').value;if(!t)return alert("Digite a fórmula PI. Ex: 6.9");let j=getJogosDoPadrao(pastaAberta),h=`<h4>⚖️ Resultado Busca PI: ${t} no padrão ${pastaAberta}</h4>`,e=0;j.forEach(x=>{if(!x.formulaPI)x.formulaPI=calcularPI(x.dezenas);if(x.formulaPI==t){e++;h+=`<div class="resultadoFormulaPI"><b>Concurso ${x.concurso}</b> - ${x.data}<br><b>Números:</b> ${x.dezenas.join(", ")}<br><b>PI:</b> ${x.formulaPI}</div>`}});if(e==0)h+=`<p>Nenhum jogo com PI ${t} encontrado</p>`;else h+=`<p><b>Total encontrado:</b> ${e} jogos</p>`;document.getElementById('resultadoBusca').innerHTML=h} /* NOVO */
function buscarInteligentePI(){let j=getJogosDoPadrao(pastaAberta);if(j.length<1)return alert(`Nenhum jogo no padrão ${pastaAberta}`);let m={};j.forEach(x=>{if(!x.formulaPI)x.formulaPI=calcularPI(x.dezenas);if(!m[x.formulaPI])m[x.formulaPI]=[];m[x.formulaPI].push({concurso:x.concurso,data:x.data,dezenas:x.dezenas})});let r=[];for(let f in m)r.push({formula:f,qtd:m[f].length,jogos:m[f].sort((a,b)=>a.concurso-b.concurso)});r.sort((a,b)=>b.qtd-a.qtd);let h=`<h4>🧠 BUSCA INTELIGENTE PI - Padrão ${pastaAberta}</h4><p>Quantas vezes cada Par/Ímpar saiu</p>`;if(r.length==0)h+=`<p>Nenhum jogo no ${pastaAberta}</p>`;else r.forEach(x=>{h+=`<div class="resultadoFormulaPI"><b>Pares e Ímpares:</b> ${x.formula}<br><b>Saiu:</b> ${x.qtd} vezes<br><b>Concursos:</b> ${x.jogos.map(j=>j.concurso).join(', ')}</div>`});document.getElementById('resultadoBusca').innerHTML=h} /* NOVO */
function gerarCombinacoes(a,t){let r=[];function c(i,o){if(o.length==t){r.push([...o]);return}for(let j=i;j<a.length;j++){o.push(a[j]);c(j+1,o);o.pop()}}c(0,[]);return r}
function buscarInteligente(){if(!pastaAberta)return alert("Abra um padrão primeiro");let j=getJogosDoPadrao(pastaAberta);if(j.length<3)return alert(`Precisa de no mínimo 3 jogos no padrão ${pastaAberta}`);let m={};j.forEach(x=>{let d=x.dezenas.sort((a,b)=>a-b);for(let t=5;t<=15;t++)gerarCombinacoes(d,t).forEach(c=>{let ch=c.join(',');if(!m[ch])m[ch]=[];m[ch].push(x.concurso)})});let r=[];for(let ch in m)if(m[ch].length>=3)r.push({combo:ch.split(','),qtd:m[ch].length,tamanho:ch.split(',').length,concursos:[...new Set(m[ch])].sort((a,b)=>a-b)});r.sort((a,b)=>b.tamanho-a.tamanho||b.qtd-a.qtd);let h=`<h4>🧠 BUSCA INTELIGENTE - Padrão ${pastaAberta}</h4><p>Sequências de 5 a 15 números que saíram em 3+ jogos desse grupo</p>`;if(r.length==0)h+=`<p>Nenhuma sequência se repetiu 3 vezes no ${pastaAberta}</p>`;else r.slice(0,30).forEach(x=>{h+=`<div class="resultadoInteligente"><b>Sequência ${x.tamanho} números:</b> ${x.combo.join(', ')}<br><b>Repetiu:</b> ${x.qtd} vezes<br><b>Concursos:</b> ${x.concursos.join(', ')}</div>`});document.getElementById('resultadoBusca').innerHTML=h}
function getJogosDaFaixa(f){let t=[];if(f=='TODOS'){Object.values(banco).forEach(p=>t.push(...p));return t}let i=parseInt(f),fim=i+99;Object.values(banco).forEach(p=>{t.push(...p.filter(j=>j.concurso>=i&&j.concurso<=fim))});return t}
function getJogosDoPadrao(p){return banco[p]?banco[p].filter(j=>{if(faixaAberta=='TODOS')return 1;return j.concurso>=parseInt(faixaAberta)&&j.concurso<=parseInt(faixaAberta)+99}):[]}
function abrirFaixa(f){faixaAberta=f;toggleMenu();document.getElementById('telaPesquisa').classList.add('oculto');document.getElementById('telaPasta').classList.remove('oculto');document.getElementById('resultadoBusca').innerHTML="";let j=getJogosDaFaixa(f),t=f=='TODOS'?'TODOS OS CONCURSOS':`Concursos ${f} a ${parseInt(f)+99}`,h=`<h2>📁 ${t}</h2><h3>Selecione o Padrão:</h3>`;padroesLista.forEach(p=>{let jp=getJogosDoPadrao(p);if(jp.length>0)h+=`<div class="pasta" onclick="abrirPastaPadrao('${p}')">${p} <span>${jp.length} jogos</span></div>`});if(j.length==0)h+="<p>Nenhum jogo salvo nessa faixa</p>";document.getElementById('areaPastas').innerHTML=h;calcularFrequencia(j)}
function abrirPastaPadrao(p){pastaAberta=p;let j=getJogosDoPadrao(p),t=faixaAberta=='TODOS'?'TODOS':`${faixaAberta} a ${parseInt(faixaAberta)+99}`,h=`<button onclick="abrirFaixa('${faixaAberta}')">⬅ VOLTAR FAIXA</button><h2>📁 Padrão ${p} - Faixa ${t}</h2>`,d=verificarDuplicidade(j);if(d.length>0)h+=`<div class="alerta"><b>🔍 ALERTA DE SIMILARIDADE:</b><br>${d.join('<br>')}</div>`;j.forEach(x=>{if(!x.formulaZUD)x.formulaZUD=calcularZUD(x.dezenas);if(!x.formula5x5)x.formula5x5=calcular5x5(x.dezenas);if(!x.formulaPI)x.formulaPI=calcularPI(x.dezenas); /* NOVO */ h+=`<div class="jogoSalvo" onclick='carregarJogoNaTabela(${JSON.stringify(x)})'><b>Concurso:</b> ${x.concurso} - ${x.data}<br><b>Números:</b> ${x.dezenas.join(", ")}<br><b>Pares:</b> ${x.pares} | <b>Ímpares:</b> ${x.impares}<br><span class="formulaZUD"><b>ZUD:</b> ${x.formulaZUD}</span><br><span class="formula5x5"><b>5x5:</b> ${x.formula5x5}</span><br><span class="formulaPI"><b>PI:</b> ${x.formulaPI}</span><br> /* NOVO */ <button onclick="event.stopPropagation(); navigator.clipboard.writeText('${x.dezenas.join(", ")}')">📋 Copiar</button><button class="btnApagar" onclick="apagarJogo('${p}', ${x.concurso}, event)">🗑️ Apagar</button></div>`});document.getElementById('areaPastas').innerHTML=h;calcularFrequencia(j)}
function voltarPesquisa(){document.getElementById('telaPasta').classList.add('oculto');document.getElementById('telaPesquisa').classList.remove('oculto')}
function voltarMenuPrincipal(){document.getElementById('telaPasta').classList.add('oculto');document.getElementById('telaPesquisa').classList.remove('oculto');montarMenuPrincipal()}
criarTabela();
</script></body></html>
